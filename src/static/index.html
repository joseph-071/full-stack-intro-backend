<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes</title>
    <link rel="stylesheet" href="/static/styles.css?v=3" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Notes</h1>
          <button id="new-note-button" class="icon-button" type="button" aria-label="New note" title="New note">
            +
          </button>
        </div>

        <div class="sidebar-search">
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Search notes..."
            autocomplete="off"
            aria-label="Search notes"
          />
          <label class="archived-toggle">
            <input id="show-archived" type="checkbox" />
            Show archived
          </label>
        </div>

        <div id="note-list" class="note-list" aria-label="Note list"></div>
      </aside>

      <main class="editor">
        <div class="editor-toolbar">
          <span id="editor-status" class="editor-status">Select or create a note</span>
          <div class="actions">
            <form id="auth-form" class="auth-panel">
              <select id="oauth-provider" class="auth-input" aria-label="OAuth provider">
                <option value="google">Google</option>
                <option value="github">GitHub</option>
              </select>
              <input
                id="oauth-user-id"
                class="auth-input auth-user-input"
                type="number"
                min="1"
                value="1"
                aria-label="OAuth user ID"
              />
              <button class="auth-button" type="submit">Sign in</button>
            </form>
            <button id="save-note-button" class="primary-button" type="button">Save</button>
            <button id="delete-note-button" class="danger-button" type="button">Delete</button>
          </div>
        </div>

        <div id="note-meta" class="note-meta" hidden>
          <button id="pin-button" class="meta-button" type="button" title="Toggle pin">
            📌 Pin
          </button>
          <button id="archive-button" class="meta-button" type="button" title="Toggle archive">
            🗂 Archive
          </button>
          <label class="emotion-label">
            Mood
            <select id="emotion-select" class="emotion-select" aria-label="Emotion">
              <option value="">—</option>
              <option value="happy">😊 Happy</option>
              <option value="excited">🤩 Excited</option>
              <option value="neutral">😐 Neutral</option>
              <option value="sad">😢 Sad</option>
              <option value="angry">😠 Angry</option>
            </select>
          </label>
        </div>

        <input
          id="note-title"
          class="title-input"
          type="text"
          maxlength="200"
          placeholder="Untitled"
          autocomplete="off"
        />
        <textarea id="note-content" class="content-input" placeholder="Start writing..."></textarea>
      </main>
    </div>

    <script src="/static/app.js?v=3"></script>
  </body>
</html>
